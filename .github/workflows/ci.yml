name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Python tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-api.txt -r requirements-dev.txt

      - name: Run tests
        env:
          NETLOGIC_JWT_SECRET: ci-test-secret-that-is-long-enough-for-tests
          NETLOGIC_ADMIN_KEY: ci-admin-key
          NETLOGIC_NO_BROWSER: "1"
        run: pytest test_*.py -v --tb=short

  build-dashboard:
    name: Dashboard build + type-check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build (includes tsc type-check)
        run: npm run build
